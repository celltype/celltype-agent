name: structure.alphafold2_multimer
display_name: AlphaFold2-Multimer
description: Predict multi-chain protein complex structure using AlphaFold2-Multimer with cached MSAs, an open-source local ColabFold/MMseqs server, or local on-disk MMseqs MSA generation (GPU).
category: structure
usage_guide: Use for AlphaFold2-Multimer-style complex prediction from multiple protein sequences with optional precomputed MSAs, `msa-search`-backed caching, and either direct local MMseqs execution or a configured open-source local ColabFold/MMseqs server for high-throughput workflows.
docker_image: celltype/alphafold2-multimer:latest
reference:
  interface_url: https://build.nvidia.com/deepmind/alphafold2-multimer
  api_docs_url: https://docs.api.nvidia.com/nim/reference/deepmind-alphafold2-multimer
examples:
  - id: nvidia-homodimer
    title: Homodimer
    description: Predict a homodimer complex from the NVIDIA Build page example.
    args:
      sequences:
        - GSHMAQPRPPFHITIPIYPGVDLLDVAAPVELFSWMADAWKARATTITLAAEHLTPLKTRDGLTLTPQRQFADYADAAAPQPQTHLLWVPGGAPDVLRKLMRGGPYLDFLKAQSAGADHVSSVCEGALLLAAAGLLDGYRATTHWAFIPCLQQFPAIKVAEGFPRYVIDGNRITGGGISSGLAEALAIVARVAGQDIAKHVQMITQYFPDPPFEQTIVPATHCPLQA
        - GSHMAQPRPPFHITIPIYPGVDLLDVAAPVELFSWMADAWKARATTITLAAEHLTPLKTRDGLTLTPQRQFADYADAAAPQPQTHLLWVPGGAPDVLRKLMRGGPYLDFLKAQSAGADHVSSVCEGALLLAAAGLLDGYRATTHWAFIPCLQQFPAIKVAEGFPRYVIDGNRITGGGISSGLAEALAIVARVAGQDIAKHVQMITQYFPDPPFEQTIVPATHCPLQA
      algorithm: mmseqs2
      e_value: 0.0001
      databases: [uniref90, small_bfd, mgnify]
      relax_prediction: true
  - id: nvidia-heterodimer
    title: Heterodimer
    description: Predict a heterodimer complex.
    args:
      sequences:
        - MNVIDIAIAMAI
        - NESKHCAWVMIPTFRQYDGL
      databases: [small_bfd]
      algorithm: mmseqs2
      relax_prediction: false
parameters:
  type: object
  additionalProperties: false
  required:
    - sequences
  properties:
    sequences:
      type: array
      description: Protein sequences, one entry per chain (each 1-4096 characters).
      items:
        type: string
      minItems: 2
      maxItems: 6
    msas:
      type: array
      description: Optional per-chain A3M MSAs aligned to `sequences`; use an empty string for chains that should still run through `genomics.msa_search`.
      items:
        type: string
      minItems: 2
      maxItems: 6
    databases:
      type: array
      description: Databases to query while building per-chain MSAs.
      items:
        type: string
        enum: [small_bfd, uniref90, mgnify]
      default: [uniref90, small_bfd, mgnify]
      minItems: 1
      maxItems: 3
    e_value:
      type: number
      description: E-value threshold used during MSA search.
      default: 0.0001
      minimum: 0
      maximum: 10
    algorithm:
      type: string
      description: Alignment search algorithm. Only local `mmseqs2` is supported in this runtime.
      enum: [mmseqs2]
      default: mmseqs2
    iterations:
      type: integer
      description: Number of MSA search iterations.
      default: 1
      minimum: 1
      maximum: 3
    relax_prediction:
      type: boolean
      description: Whether to run the relaxation step after structure prediction.
      default: true
    selected_models:
      type: array
      description: Specific multimer model presets to run for this request.
      items:
        type: integer
        enum: [1, 2, 3, 4, 5]
      default: [1, 2, 3, 4, 5]
      minItems: 1
    msa_cache_dir:
      type: string
      description: Optional persistent directory for cached per-chain MSAs keyed by sequence hash.
    msa_backend:
      type: string
      description: MSA backend to use through `genomics.msa_search`.
      enum: [auto, cli, server]
      default: auto
    msa_server_url:
      type: string
      description: Base URL for a local ColabFold/MMseqs server, for example `http://127.0.0.1:8080/api` or `http://127.0.0.1:8080`.
    msa_server_search_type:
      type: string
      description: Search mode to request from the local MSA server.
      enum: [colabfold]
      default: colabfold
compute:
  requires_gpu: true
  min_vram_gb: 32
  gpu_profile: structure
  estimated_cost_usd: 0.15
  gpu_type: A100
modal_function: predict_structure_alphafold2_multimer
execution:
  timeout_s: 900
