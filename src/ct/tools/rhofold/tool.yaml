name: structure.rhofold
display_name: RhoFold+
description: RNA 3D structure prediction from sequence using deep learning
category: structure
usage_guide: Use for predicting RNA 3D structures from sequence. RhoFold+ outperforms human experts on RNA-Puzzles. Handles any single-chain RNA sequence. No structure tools for RNA existed in the platform before this.
docker_image: celltype/rhofold:latest
parameters:
  sequence: RNA sequence (e.g. 'GGGAAACCC') or path to FASTA file
  name: Name/ID for the prediction (optional, default 'rna_pred')
compute:
  requires_gpu: true
  min_vram_gb: 16
  gpu_profile: structure
  estimated_cost_usd: 0.05
  gpu_type: A10G
modal_function: predict_structure_rhofold
execution:
  timeout_s: 600
