name: structure.boltz2
display_name: Boltz-2
description: Predict protein structure or protein-ligand complex using Boltz-2 (GPU). Supports complex prediction with ligands.
category: structure
usage_guide: 'Use for high-accuracy structure prediction, especially protein-ligand complexes. VRAM scales with sequence length:
  4GB for <50 residues, 40GB for >500.'
docker_image: celltype/boltz2:latest
reference:
  interface_url: https://build.nvidia.com/mit/boltz2
  api_docs_url: https://docs.api.nvidia.com/nim/reference/mit-boltz2
examples:
  - id: insulin-protein
    title: Insulin (single protein)
    description: Predict insulin structure from sequence.
    args:
      sequence: MALWMRLLPLLALLALWGPDPAAAFVNQHLCGSHLVEALYLVCGERGFFYTPKTRREAEDLQVGQVELGGGPGAGSLQPLALEGSLQKRGIVEQCCTSICSLYQLENYCN
  - id: protein-ligand-complex
    title: Protein + Aspirin complex
    description: Predict a protein-ligand complex with aspirin.
    args:
      sequence: MALWMRLLPLLALLALWGPDPAAAFVNQHLCGSHLVEALYLVCGERGFFYTPKTRREAEDLQVGQVELGGGPGAGSLQPLALEGSLQKRGIVEQCCTSICSLYQLENYCN
      ligand_smiles: "CC(=O)OC1=CC=CC=C1C(=O)O"
parameters:
  type: object
  additionalProperties: false
  required:
    - sequence
  properties:
    sequence:
      type: string
      description: Amino acid sequence (1-4096 characters).
      maxLength: 4096
    ligand_smiles:
      type: string
      description: Optional SMILES string for protein-ligand complex prediction.
    ligand_ccd:
      type: string
      description: Optional CCD identifier for ligand molecules (alternative to SMILES).
    output_format:
      type: string
      description: Structure output format.
      enum: [mmcif, pdb]
      default: mmcif
compute:
  requires_gpu: true
  min_vram_gb: 32
  gpu_profile: structure
  estimated_cost_usd: 0.15
  gpu_type: A100
modal_function: predict_structure_boltz2
execution:
  timeout_s: 600
