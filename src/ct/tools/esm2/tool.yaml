name: embeddings.esm2
display_name: ESM2-650M
description: Generate protein embeddings using ESM2-650M (GPU). Produces per-residue and pooled sequence embeddings.
category: embeddings
usage_guide: Use to generate protein embeddings for similarity search, clustering, or downstream ML tasks. ~3GB VRAM base
  + scales with sequence length.
docker_image: celltype/esm2:latest
reference:
  interface_url: https://build.nvidia.com/meta/esm2-650m
  api_docs_url: https://docs.api.nvidia.com/nim/reference/meta-esm2-650m
examples:
  - id: nvidia-example
    title: NVIDIA Build example
    description: Generate embeddings for a sequence from the NVIDIA Build page.
    args:
      sequence: FAMLIGFVYGARFIQTWGDH
  - id: insulin-embedding
    title: Insulin chain B embedding
    description: Generate embeddings for insulin chain B.
    args:
      sequence: FVNQHLCGSHLVEALYLVCGERGFFYTPKT
parameters:
  type: object
  additionalProperties: false
  required:
    - sequence
  properties:
    sequence:
      type: string
      description: Amino acid sequence string (max 1024 characters).
      maxLength: 1024
      pattern: "^[ARNDCQEGHILKMFPSTWYVXBOU]*$"
compute:
  requires_gpu: true
  min_vram_gb: 32
  gpu_profile: structure
  estimated_cost_usd: 0.03
  gpu_type: A10G
modal_function: embed_esm2
execution:
  timeout_s: 300
