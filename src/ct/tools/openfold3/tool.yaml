name: structure.openfold3
display_name: OpenFold3
description: Predict biomolecular complex structures with an OpenFold3-compatible multimolecule request payload (GPU).
category: structure
usage_guide: 'Use for OpenFold3-style multimolecule structure prediction across proteins, nucleic acids, and ligands.'
docker_image: celltype/openfold3:latest
reference:
  interface_url: https://build.nvidia.com/openfold/openfold3
  api_docs_url: https://docs.api.nvidia.com/nim/reference/openfold-openfold3
examples:
  - id: nvidia-protein-dna
    title: Protein + DNA complex (5GNJ)
    description: Predict a protein-DNA complex from the NVIDIA Build page example.
    args:
      request_id: 5GNJ
      inputs:
        - input_id: 5GNJ
          molecules:
            - type: protein
              id: A
              sequence: MGREEPLNHVEAERQRREKLNQRFYALRAVVPNVSKMDKASLLGDAIAYINELKSKVVKTESEKLQIKNQLEEVKLELAGRLEHHHHHH
            - type: dna
              id: B
              sequence: AGGAACACGTGACCC
            - type: dna
              id: C
              sequence: TGGGTCACGTGTTCC
          output_format: pdb
parameters:
  type: object
  additionalProperties: false
  required:
    - request_id
    - inputs
  properties:
    request_id:
      type: string
      description: Top-level request identifier.
    inputs:
      type: array
      description: One or more OpenFold3 prediction inputs.
      minItems: 1
      items:
        type: object
        additionalProperties: false
        required:
          - input_id
          - molecules
        properties:
          input_id:
            type: string
            description: Input identifier unique within the request.
          molecules:
            type: array
            minItems: 1
            items:
              type: object
              additionalProperties: false
              required:
                - type
                - id
              properties:
                type:
                  type: string
                  enum: [protein, dna, rna, ligand]
                id:
                  type: string
                  description: Molecule or chain identifier.
                sequence:
                  type: string
                  description: Sequence for protein (max 1000 chars), DNA, or RNA molecules.
                  maxLength: 1000
                msa:
                  type: object
                  description: Optional MSA payload for protein or RNA molecules.
                ccd_code:
                  type: string
                  description: CCD identifier for ligand molecules.
                smiles:
                  type: string
                  description: SMILES string for ligand molecules.
          output_format:
            type: string
            enum: [pdb, mmcif]
            description: Structure output format.
compute:
  requires_gpu: true
  min_vram_gb: 32
  gpu_profile: structure
  estimated_cost_usd: 0.25
  gpu_type: A100
modal_function: predict_structure_openfold3
execution:
  timeout_s: 900
